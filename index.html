<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Site Clock</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1F2421" />

    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Site Clock" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          // updateViaCache: "none" stops the browser from ever applying its
          // own HTTP caching to service-worker.js itself — without this,
          // an update to the service worker's own code (like the caching
          // strategy fixes we've shipped) could sit uninstalled on a
          // device for a long time before the browser notices it changed.
          navigator.serviceWorker
            .register("/service-worker.js", { updateViaCache: "none" })
            .then((registration) => registration.update())
            .catch(console.error);
        });
      }
    </script>
  </body>
</html>
